spring:
  application:
    name: site-agent-backend

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      mode: never

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

supabase:
  url: ${SUPABASE_URL}
  key: ${SUPABASE_KEY}
  bucket: pdf

fastapi:
  url:  ${FASTAPI_URL}

server:
  port: ${PORT:8080}

jwt:
  secret: ${JWT_SECRET}
  expiration: 2592000000

kakao:
  client-id: ${KAKAO_CLIENT_ID}
  client-secret: ${KAKAO_CLIENT_SECRET}
  redirect-uri: ${KAKAO_REDIRECT_URI}
