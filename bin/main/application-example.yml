spring:
  application:
    name: site-agent-backend

  datasource:
    url: YOUR_DB_URL
    username: YOUR_DB_USERNAME
    password: YOUR_DB_PASSWORD
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      mode: always

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

supabase:
  url: YOUR_SUPABASE_URL
  key: YOUR_SUPABASE_KEY
  bucket: pdf

fastapi:
  url: http://localhost:8000

server:
  port: ${PORT:8080}

jwt:
  secret: ${JWT_SECRET:localdevsecretkey1234567890abcdef}
  expiration: 2592000000

kakao:
  client-id: ${KAKAO_CLIENT_ID:}
  redirect-uri: ${KAKAO_REDIRECT_URI:}